<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 무한 알고리즘 트레이닝 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-dark: #1e1e1e; --panel-bg: #252526; --border-color: #333333; --text-main: #d4d4d4; --accent: #007acc; --success: #4caf50; --warning: #ff9800; --danger: #ef5350; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* 버그 수정 1: 전체 패널의 넘침 방지 고정 */
        .left-panel { flex: 1.1; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); background-color: var(--panel-bg); overflow: hidden; }
        
        .top-nav { padding: 15px 20px; background: #181818; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap;}
        .top-nav-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .top-nav select, .top-nav input { background: #3c3c3c; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; outline: none; }
        .top-nav input { width: 180px; }
        
        .btn-gen { background: #673ab7; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-history-toggle { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

        .problem-section { padding: 20px; border-bottom: 1px solid var(--border-color); flex: 0.8; overflow-y: auto; }
        .problem-title { font-size: 22px; margin-top: 0; color: #ffffff; }
        .badge { display: inline-block; background: var(--warning); color: #000; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; margin-right: 5px; }
        .badge.company { background: #007acc; color: white; }
        .badge.category { background: #e91e63; color: white; }
        
        /* 버그 수정 2: 채팅창 높이 제한 및 개별 스크롤 처리 */
        .ai-feedback-section { flex: 1.2; display: flex; flex-direction: column; background-color: #1e1e1e; min-height: 0; overflow: hidden; }
        
        .chat-header { padding: 10px 20px; background: #2d2d30; border-bottom: 1px solid var(--border-color); margin: 0; font-size: 16px; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 14px; border-radius: 8px; max-width: 85%; line-height: 1.5; font-size: 14px; }
        .bot-msg { background: #2d2d30; border-left: 3px solid var(--accent); align-self: flex-start; }
        .user-msg { background: var(--accent); color: white; align-self: flex-end; }
        .chat-input { display: flex; padding: 15px; background: #252526; border-top: 1px solid var(--border-color); gap: 10px; }
        .chat-input input { flex: 1; background: #1e1e1e; border: 1px solid #555; color: white; padding: 10px; border-radius: 4px; outline: none; }
        .chat-input button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }

        .right-panel { flex: 1; display: flex; flex-direction: column; position: relative; }
        .editor-header { padding: 10px 20px; background: #2d2d30; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .editor-header select { background: #3c3c3c; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; outline: none; }
        
        .timer-display { background: #000; color: #00ff00; font-family: 'Fira Code', monospace; padding: 5px 10px; border-radius: 4px; font-weight: bold; border: 1px solid #333; }

        .code-area { flex: 1; width: 100%; background: #1e1e1e; color: #d4d4d4; font-family: 'Fira Code', monospace; font-size: 15px; padding: 20px; border: none; resize: none; outline: none; box-sizing: border-box; }
        .action-bar { padding: 15px 20px; background: #252526; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .btn-submit { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-refactor { background: #009688; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* 복습용 서랍 & 대시보드 UI */
        .history-panel { position: absolute; top: 0; right: -450px; width: 450px; height: 100%; background: #1a1a1a; border-left: 1px solid var(--border-color); z-index: 10; transition: 0.3s; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;}
        .history-panel.open { right: 0; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        
        .chart-container { background: #252526; padding: 15px; border-radius: 8px; margin-bottom: 15px; height: 150px; display: flex; justify-content: center; align-items: center; border: 1px solid #333;}
        .recommend-box { background: #3a233c; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #673ab7; font-size: 13px;}
        .btn-rec-run { background: #e91e63; color: white; border: none; padding: 5px 10px; border-radius: 4px; margin-top: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: #2d2d30; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 4px solid #673ab7; }
        .history-item.correct { border-left-color: var(--success); }
        .score-badge { background: #444; padding: 3px 6px; border-radius: 4px; font-size: 11px; margin-left: 8px; color: #fff;}
        .score-high { background: #007acc; }
        .btn-del { background: none; color: var(--danger); border: none; cursor: pointer; font-size: 14px; }

        /* 최적화 창 레이어 */
        .modal-refactor { display: none; position: absolute; bottom: 60px; left: 20px; right: 20px; top: 60px; background: #1e1e1e; border: 2px solid var(--accent); border-radius: 8px; z-index: 5; padding: 20px; flex-direction: column; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="top-nav">
            <div class="top-nav-controls">
                <select id="companySelect">
                    <option value="">일반 알고리즘</option>
                    <option value="카카오">카카오 (Kakao)</option>
                    <option value="네이버">네이버 (Naver)</option>
                    <option value="삼성전자">삼성전자 (Samsung)</option>
                    <option value="우아한형제들">우아한형제들 (Baemin)</option>
                    <option value="토스">토스 (Toss)</option>
                </select>

                <select id="difficultySelect">
                    <option value="LV.01 입문">LV.01 입문</option>
                    <option value="LV.03 초중급">LV.03 초중급</option>
                    <option value="LV.05 중상급" selected>LV.05 중상급</option>
                    <option value="LV.08 심화">LV.08 심화</option>
                    <option value="LV.10 마스터">LV.10 마스터</option>
                </select>
                
                <input type="text" id="customPromptInput" placeholder="나만의 특별 주제 (예: 배달 서비스 상황)">

                <button type="button" class="btn-gen" onclick="generateProblem(null)"><i class="fas fa-magic"></i> 새 문제 출제</button>
            </div>
            <button type="button" class="btn-history-toggle" onclick="toggleHistory()"><i class="fas fa-history"></i> 대시보드</button>
        </div>

        <div class="problem-section" id="problemSection">
            <div id="badgeContainer">
                <span class="badge" id="difficultyBadge">Level: 미정</span>
            </div>
            <h2 class="problem-title" id="pTitle">새 문제를 생성해 주세요!</h2>
            <p id="pDesc" style="color: #aaa;">지정된 조건에 맞춰 AI가 상대적 난이도를 설정하여 출제합니다.</p>
        </div>

        <div class="ai-feedback-section">
            <h3 class="chat-header"><i class="fas fa-comments"></i> 1:1 실시간 맞춤 힌트 세션</h3>
            <div class="chat-box" id="chatBox">
                <div class="bubble bot-msg">문제를 새로 생성하면 타이머가 시작됩니다! 막히는 부분이 있다면 질문하세요.</div>
            </div>
            <div class="chat-input">
                <input type="text" id="questionInput" placeholder="힌트 요구나 막히는 로직을 질문하세요..." onkeypress="if(event.keyCode==13) sendQuestion()">
                <button type="button" onclick="sendQuestion()"><i class="fas fa-location-arrow"></i></button>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="editor-header">
            <div>
                <select id="languageSelect" onchange="changeTemplate()">
                    <option value="JavaScript">JavaScript</option>
                    <option value="Python">Python</option>
                    <option value="C++">C++</option>
                </select>
            </div>
            <div class="timer-display" id="timerDisplay"><i class="fas fa-stopwatch"></i> 00:00</div>
        </div>
        <textarea class="code-area" id="codeInput" spellcheck="false"></textarea>
        
        <div class="action-bar">
            <button type="button" class="btn-refactor" onclick="getRefactor()"><i class="fas fa-rocket"></i> AI 코드 최적화 및 복잡도 분석</button>
            <button type="button" class="btn-submit" onclick="runCode()"><i class="fas fa-check-circle"></i> 검증 및 제출 채점</button>
        </div>

        <div class="modal-refactor" id="refactorModal">
            <h3 style="margin-top:0; display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#009688;"><i class="fas fa-microchip"></i> AI 최적화 리팩토링 리포트</span>
                <button type="button" style="background:none; border:none; color:#ff5353; cursor:pointer;" onclick="document.getElementById('refactorModal').style.display='none'">닫기</button>
            </h3>
            <div style="display:flex; gap:20px; height: 160px; margin-bottom:15px;">
                <div style="flex:1; background:#252526; padding:10px; border-radius:6px; border:1px solid #444;">
                    <canvas id="refactorChart"></canvas>
                </div>
                <div style="flex:1; font-size:13px; overflow-y:auto; padding:5px;" id="refactorAnalysis"></div>
            </div>
            <textarea id="refactorCodeArea" style="flex:1; background:#000; color:#4af; font-family:'Fira Code',monospace; padding:10px; border:none; resize:none;" readonly></textarea>
        </div>

        <div class="history-panel" id="historyPanel">
            <h3 style="margin-top:0; display:flex; justify-content:space-between; color: white;">
                <span><i class="fas fa-chart-pie"></i> 내 학습 통계 & 복습</span>
                <i class="fas fa-times" style="cursor:pointer; color: #aaa;" onclick="toggleHistory()"></i>
            </h3>
            
            <div class="recommend-box" id="recommendBox">
                <div id="recommendMsg">제출 기록을 수집 중입니다... (최소 3회 제출 필요)</div>
                <button type="button" class="btn-rec-run" id="btnRecRun" style="display:none;"></button>
            </div>

            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        let currentProblemId = null;
        let timerInterval = null;
        let timeElapsed = 0;
        let myChart = null; 
        let refactorChart = null;
        let cachedWeakCategory = null; 

        function changeTemplate() {
            const lang = document.getElementById('languageSelect').value;
            const editor = document.getElementById('codeInput');
            if (lang === 'JavaScript') editor.value = "function solution(input) {\n    let answer = 0;\n    return answer;\n}";
            else if (lang === 'Python') editor.value = "def solution(input_data):\n    answer = 0\n    return answer";
            else if (lang === 'C++') editor.value = "#include <iostream>\nusing namespace std;\n\nint solution() {\n    return 0;\n}";
        }

        function startTimer() {
            clearInterval(timerInterval); timeElapsed = 0; updateTimerDisplay();
            timerInterval = setInterval(() => { timeElapsed++; updateTimerDisplay(); }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); }
        function updateTimerDisplay() {
            let m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
            let s = String(timeElapsed % 60).padStart(2, '0');
            document.getElementById('timerDisplay').innerHTML = `<i class="fas fa-stopwatch"></i> ${m}:${s}`;
        }

        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) { loadHistoryList(); loadAIRecommendation(); }
        }

        async function generateProblem(forcedCategory = null) {
            const diff = document.getElementById('difficultySelect').value;
            const comp = document.getElementById('companySelect').value;
            const custom = document.getElementById('customPromptInput').value;
            
            document.getElementById('pTitle').innerText = "AI 컴파일 및 출제 위원 가동 중...";
            document.getElementById('pDesc').innerText = "잠시만 기다려주세요...";
            document.getElementById('chatBox').innerHTML = '<div class="bubble bot-msg">타이머가 곧 시작됩니다! 화이팅 🚀</div>';
            stopTimer(); timeElapsed = 0; updateTimerDisplay();
            document.getElementById('refactorModal').style.display = 'none';
            
            try {
                const response = await fetch('http://localhost:5000/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        difficulty: diff, 
                        company: comp, 
                        customPrompt: custom,
                        recommendCategory: forcedCategory 
                    }) 
                });
                const data = await response.json();
                currentProblemId = data.id;
                
                const badgeContainer = document.getElementById('badgeContainer');
                badgeContainer.innerHTML = `<span class="badge" id="difficultyBadge">Level: ${diff}</span>`;
                if(data.company && data.company !== '일반') {
                    badgeContainer.innerHTML = `<span class="badge company"><i class="fas fa-building"></i> ${data.company} 기출 변형</span>` + badgeContainer.innerHTML;
                }
                if(data.category) {
                    badgeContainer.innerHTML = `<span class="badge category"><i class="fas fa-tags"></i> ${data.category}</span>` + badgeContainer.innerHTML;
                }

                document.getElementById('pTitle').innerText = data.title;
                document.getElementById('pDesc').innerHTML = data.desc;
                changeTemplate(); startTimer(); 
            } catch (error) { alert('서버 에러 발생'); }
        }

        async function getRefactor() {
            if(!currentProblemId) return alert('활성화된 문제가 없습니다.');
            const code = document.getElementById('codeInput').value;
            const title = document.getElementById('pTitle').innerText;
            
            const modal = document.getElementById('refactorModal');
            modal.style.display = 'flex';
            document.getElementById('refactorAnalysis').innerText = "AI 아키텍트가 성능 개선 요소를 정밀 분석 중입니다...";
            document.getElementById('refactorCodeArea').value = "";

            try {
                const res = await fetch('http://localhost:5000/api/refactor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, problemTitle: title })
                });
                const data = await res.json();
                
                document.getElementById('refactorAnalysis').innerHTML = `<strong>[AI 분석 리포트]</strong><br>${data.analysis.replace(/\n/g, '<br>')}`;
                document.getElementById('refactorCodeArea').value = data.refactoredCode;

                const ctx = document.getElementById('refactorChart').getContext('2d');
                if(refactorChart) refactorChart.destroy();
                refactorChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['내 코드 성능', 'AI 최적화 성능'],
                        datasets: [{
                            label: '상대적 자원 소모도 (낮을수록 우수)',
                            data: [data.originalCost, data.optimizedCost],
                            backgroundColor: ['#ef5350', '#4caf50']
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { min: 0, max: 120, ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } }
                    }
                });
            } catch (e) { document.getElementById('refactorAnalysis').innerText = "최적화 리포트 생성 실패."; }
        }

        async function loadAIRecommendation() {
            try {
                const res = await fetch('http://localhost:5000/api/recommend');
                const data = await res.json();
                const btn = document.getElementById('btnRecRun');
                
                if (data.status === 'NEED_DATA') {
                    document.getElementById('recommendMsg').innerText = data.message;
                    btn.style.display = 'none';
                } else {
                    document.getElementById('recommendMsg').innerHTML = data.message;
                    cachedWeakCategory = data.weakestCategory;
                    btn.innerText = `🔥 [${cachedWeakCategory}] 맞춤 훈련 시작`;
                    btn.style.display = 'block';
                    btn.onclick = () => {
                        generateProblem(cachedWeakCategory);
                        toggleHistory();
                    };
                }
            } catch (e) {}
        }

        async function sendQuestion() {
            const input = document.getElementById('questionInput'); const txt = input.value.trim();
            if (!txt || !currentProblemId) return alert('문제를 먼저 생성하세요.');
            appendMsg(txt, true); input.value = '';
            try {
                const response = await fetch('http://localhost:5000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ problemId: currentProblemId, code: document.getElementById('codeInput').value, problemTitle: document.getElementById('pTitle').innerText, question: txt })
                });
                const data = await response.json(); appendMsg(data.answer, false);
            } catch (e) { alert('채팅 실패'); }
        }

        function appendMsg(text, isUser) {
            const box = document.getElementById('chatBox'); const div = document.createElement('div');
            div.className = `bubble ${isUser ? 'user-msg' : 'bot-msg'}`; div.innerHTML = text.replace(/\n/g, '<br>');
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        async function runCode() {
            if(!currentProblemId) return alert('활성화된 문제가 없습니다.');
            const btn = document.querySelector('.btn-submit'); btn.innerText = "채점 중...";
            try {
                const response = await fetch('http://localhost:5000/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ problemId: currentProblemId, code: document.getElementById('codeInput').value, language: document.getElementById('languageSelect').value, difficulty: document.getElementById('difficultySelect').value, problemTitle: document.getElementById('pTitle').innerText, problemDesc: document.getElementById('pDesc').innerText })
                });
                const res = await response.json(); btn.innerHTML = '<i class="fas fa-check-circle"></i> 검증 및 제출 채점';
                if(res.isCorrect) {
                    stopTimer(); alert(`✅ 정답! (AI 점수: ${res.score}점)\n${res.message}`);
                } else { alert(`❌ 오답입니다.\n\n${res.message}`); }
            } catch (e) { btn.innerHTML = '채점 실패'; }
        }

        function renderChart(data) {
            const ctx = document.getElementById('statsChart').getContext('2d');
            let correctCount = data.filter(d => d.is_correct).length;
            let wrongCount = data.length - correctCount;
            if(myChart) myChart.destroy(); 
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['정답', '오답'], datasets: [{ data: [correctCount, wrongCount], backgroundColor: ['#4caf50', '#ef5350'], borderColor: '#252526', borderWidth: 2 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } } } }
            });
        }

        async function loadHistoryList() {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            try {
                const res = await fetch('http://localhost:5000/api/history'); const items = await res.json();
                renderChart(items); 
                items.forEach(item => {
                    const div = document.createElement('div'); div.className = `history-item ${item.is_correct ? 'correct' : ''}`;
                    const scoreClass = item.score >= 80 ? 'score-high' : '';
                    const compTag = (item.company && item.company !== '일반') ? `<span style="color:#007acc; font-weight:bold; margin-right:5px;">[${item.company}]</span>` : '';
                    div.innerHTML = `
                        <div onclick="restoreSession(${item.problem_id})" style="flex:1;">
                            <small>${compTag}[${item.difficulty}]</small>
                            <div style="font-weight:bold; margin: 4px 0;">${item.title}</div>
                            <small style="color:#aaa;">${item.language} / ${item.is_correct ? '정답' : '오답'} <span class="score-badge ${scoreClass}">${item.score}점</span></small>
                        </div>
                        <button type="button" class="btn-del" onclick="deleteHistory(event, ${item.submission_id})"><i class="fas fa-trash"></i></button>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {}
        }

        async function restoreSession(probId) {
            try {
                const res = await fetch(`http://localhost:5000/api/history/${probId}`); const data = await res.json();
                currentProblemId = data.problem.id;
                const badgeContainer = document.getElementById('badgeContainer');
                badgeContainer.innerHTML = `<span class="badge" id="difficultyBadge">Level: ${data.problem.difficulty}</span>`;
                if(data.problem.company && data.problem.company !== '일반') { badgeContainer.innerHTML = `<span class="badge company"><i class="fas fa-building"></i> ${data.problem.company} 기출</span>` + badgeContainer.innerHTML; }
                if(data.problem.category) { badgeContainer.innerHTML = `<span class="badge category"><i class="fas fa-tags"></i> ${data.problem.category}</span>` + badgeContainer.innerHTML; }
                document.getElementById('pTitle').innerText = data.problem.title; document.getElementById('pDesc').innerHTML = data.problem.description;
                document.getElementById('codeInput').value = data.lastCode; document.getElementById('languageSelect').value = data.lastLang;
                const box = document.getElementById('chatBox'); box.innerHTML = '';
                data.chatHistory.forEach(c => appendMsg(c.message, c.sender === 'user'));
                toggleHistory(); stopTimer(); 
            } catch (e) { alert('복원 실패'); }
        }

        async function deleteHistory(e, subId) { e.stopPropagation(); if(!confirm('삭제하시겠습니까?')) return; try { await fetch(`http://localhost:5000/api/history/${subId}`, { method: 'DELETE' }); loadHistoryList(); } catch (e) {} }
        changeTemplate();
    </script>
